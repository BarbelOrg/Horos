name: build_and_upload
on:
  - push
  - pull_request

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Install GCC 16
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y gcc-16 g++-16
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-16 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-16 100
          gcc --version
          g++ --version

      - name: Install Qt 6.10
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.0'
          modules: 'qtshadertools'
          cache: true

      - name: Install extra build deps
        run: |
          sudo apt-get install -y libgl1-mesa-dev

      - name: Cache xmake packages
        uses: actions/cache@v6
        with:
          path: |
            ~/.xmake
            .xmake
          key: xmake-gcc16-${{ runner.os }}-${{ hashFiles('xmake.lua') }}
          restore-keys: |
            xmake-gcc16-${{ runner.os }}-

      - name: Configure
        run: |
          export XMAKE_ROOT=y
          xmake f -m release --toolchain=gcc -y

      - name: Build
        run: |
          export XMAKE_ROOT=y
          xmake -y -v

      - name: Install to staging dir
        run: |
          export XMAKE_ROOT=y
          xmake install -o "$PWD/dist" -y

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: horos-${{ github.sha }}
          path: dist/
          retention-days: 1
          if-no-files-found: error